<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSC CGL Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="js/subjects.js"></script>
  <script src="data/ancient-history/ch01-early-history.js"></script>
  <script src="data/ancient-history/ch02-ivc.js"></script>
  <script src="data/ancient-history/ch03-vedic-age.js"></script>
  <script src="data/ancient-history/ch04-buddhism-jainism.js"></script>
  <script src="data/ancient-history/ch05-mahajanapads.js"></script>
</head>
<body>

<div class="app-wrap">

  <header class="app-header">
    <div class="logo">SSC <span>Quiz</span></div>
    <div class="tagline">SSC CGL Revision</div>
  </header>

  <!-- SUBJECTS -->
  <div id="screen-subject" class="screen">
    <p class="section-label">Start here</p>
    <h1 class="section-title">Choose a subject</h1>
    <p class="section-sub">Pick a subject to see its chapters</p>
    <div class="card-grid" id="subject-grid"></div>
  </div>

  <!-- CHAPTERS -->
  <div id="screen-chapter" class="screen">
    <nav class="breadcrumb" id="chapter-breadcrumb" aria-label="navigation">
      <span class="bc-link" onclick="goSubjects()">Subjects</span>
      <span class="bc-sep">/</span>
      <span class="bc-current" id="chapter-subject-title"></span>
    </nav>
    <div class="chapter-header">
      <div class="chapter-header-icon" id="chapter-subject-icon"></div>
      <div class="chapter-header-info">
        <h1 class="section-title">Chapters</h1>
        <p class="section-sub">Choose a chapter to start the quiz</p>
      </div>
    </div>
    <div class="card-grid" id="chapter-grid"></div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen quiz-fullscreen">

    <!-- TOP -->
    <div class="quiz-top">
      <nav class="breadcrumb" id="quiz-breadcrumb"></nav>
      <div class="quiz-meta-row">
        <span class="prog-text" id="prog-text">Q 1 / 95</span>
        <span class="prog-attempted" id="prog-attempted">0 attempted</span>
        <button class="btn-goto" onclick="openGotoModal()">Go to Q</button>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-bar"></div></div>
    </div>

    <!-- BODY -->
    <div class="quiz-body">
      <p class="q-text" id="q-text"></p>
      <div class="options-list" id="options"></div>
      <div class="feedback-box" id="feedback-box"></div>
    </div>

    <!-- FOOTER -->
    <div class="quiz-footer">
      <button class="btn btn-outline btn-prev" id="btn-prev" onclick="prevQuestion()" style="display:none">← Prev</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" style="display:none">Next →</button>
      <button class="btn btn-end"  id="btn-end"  onclick="endQuiz()"     style="display:none">Finish →</button>
    </div>

  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <nav class="breadcrumb" id="result-breadcrumb"></nav>
    <div class="result-card">
      <div class="result-pct" id="res-pct">—</div>
      <div class="result-grade" id="res-grade"></div>
      <div class="result-chapter-label" id="res-chapter"></div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-num good" id="res-correct">0</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-box"><div class="stat-num bad"  id="res-wrong">0</div><div class="stat-lbl">Wrong</div></div>
        <div class="stat-box"><div class="stat-num"      id="res-skipped">0</div><div class="stat-lbl">Skipped</div></div>
        <div class="stat-box"><div class="stat-num"      id="res-attempted">0</div><div class="stat-lbl">Attempted</div></div>
        <div class="stat-box"><div class="stat-num"      id="res-total">0</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box"><div class="stat-num"      id="res-time">—</div><div class="stat-lbl">Time</div></div>
      </div>
      <div class="result-actions">
        <button class="btn" onclick="retryQuiz()">↺ Retry</button>
        <button class="btn btn-outline" onclick="goChapters()">← Chapters</button>
        <button class="btn btn-outline" onclick="goSubjects()">⌂ Subjects</button>
      </div>
    </div>
  </div>

</div><!-- /app-wrap -->

<!-- GO TO QUESTION MODAL -->
<div id="goto-modal" class="modal-backdrop">
  <div class="modal-box">
    <div class="modal-title">Go to Question</div>
    <div class="modal-sub" id="goto-range">Enter a question number</div>
    <input id="goto-input" class="modal-input" type="number" min="1" placeholder="e.g. 42" />
    <div class="modal-error" id="goto-error"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeGotoModal()">Cancel</button>
      <button class="btn" onclick="submitGoto()">Go →</button>
    </div>
  </div>
</div>

<script src="js/quiz.js"></script>
</body>
</html>
