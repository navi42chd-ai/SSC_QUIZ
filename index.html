<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSC CGL Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Subjects registry -->
  <script src="js/subjects.js"></script>

  <!-- Chapter data files — History -->
  <script src="data/history/ancient-india.js"></script>
  <script src="data/history/medieval-india.js"></script>
  <script src="data/history/modern-india.js"></script>

  <!-- Chapter data files — Geography -->
  <script src="data/geography/physical-geography.js"></script>
  <script src="data/geography/indian-climate.js"></script>

  <!-- Chapter data files — Polity -->
  <script src="data/polity/constitution.js"></script>
  <script src="data/polity/parliament.js"></script>

  <!-- Chapter data files — Static GK -->
  <script src="data/static-gk/dance.js"></script>
  <script src="data/static-gk/arts-personality.js"></script>
  <script src="data/static-gk/arts-awards.js"></script>
  <script src="data/static-gk/musical-instruments.js"></script>
  <script src="data/static-gk/festivals.js"></script>
</head>
<body>

<div class="app-wrap">

  <!-- HEADER -->
  <header class="app-header">
    <div class="logo">SSC <span>Quiz</span></div>
    <div class="tagline">SSC CGL Revision</div>
  </header>

  <!-- ── SCREEN: SUBJECTS ── -->
  <div id="screen-subject" class="screen">
    <p class="section-label">Start here</p>
    <h1 class="section-title">Choose a subject</h1>
    <p class="section-sub">Pick a subject to see its chapters</p>
    <div class="card-grid" id="subject-grid"></div>
  </div>

  <!-- ── SCREEN: CHAPTERS ── -->
  <div id="screen-chapter" class="screen">
    <nav class="breadcrumb" id="chapter-breadcrumb" aria-label="navigation">
      <span class="bc-link" onclick="goSubjects()">Subjects</span>
      <span class="bc-sep">/</span>
      <span class="bc-current" id="chapter-subject-title"></span>
    </nav>
    <div class="chapter-header">
      <div class="chapter-header-icon" id="chapter-subject-icon"></div>
      <div class="chapter-header-info">
        <h1 class="section-title" id="chapter-heading">Chapters</h1>
        <p class="section-sub">Choose a chapter to start the quiz</p>
      </div>
    </div>
    <div class="card-grid" id="chapter-grid"></div>
  </div>

  <!-- ── SCREEN: QUIZ ── -->
  <div id="screen-quiz" class="screen quiz-fullscreen">
    <!-- TOP: breadcrumb + progress -->
    <div class="quiz-top">
      <nav class="breadcrumb" id="quiz-breadcrumb" aria-label="navigation"></nav>
      <div class="quiz-meta-row">
        <span class="prog-text" id="prog-text">1 / 5</span>
        <span class="score-live" id="score-live">Score: 0</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="prog-bar"></div>
      </div>
    </div>

    <!-- MIDDLE: question + options + feedback (scrollable) -->
    <div class="quiz-body">
      <p class="q-text" id="q-text"></p>
      <div class="options-list" id="options"></div>
      <div class="feedback-box" id="feedback-box"></div>
    </div>

    <!-- BOTTOM: next button always visible -->
    <div class="quiz-footer">
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" style="display:none">
        Next question →
      </button>
    </div>
  </div>

  <!-- ── SCREEN: RESULT ── -->
  <div id="screen-result" class="screen">
    <nav class="breadcrumb" id="result-breadcrumb" aria-label="navigation"></nav>

    <div class="result-card">
      <div class="result-pct" id="res-pct">0%</div>
      <div class="result-grade" id="res-grade"></div>
      <div class="result-chapter-label" id="res-chapter"></div>

      <div class="result-stats">
        <div class="stat-box">
          <div class="stat-num good" id="res-correct">0</div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-box">
          <div class="stat-num bad" id="res-wrong">0</div>
          <div class="stat-lbl">Wrong</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="res-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="res-time">—</div>
          <div class="stat-lbl">Time</div>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn" onclick="retryQuiz()">↺ Retry</button>
        <button class="btn btn-outline" onclick="goChapters()">← Chapters</button>
        <button class="btn btn-outline" onclick="goSubjects()">⌂ Subjects</button>
      </div>
    </div>
  </div>

</div><!-- /app-wrap -->

<script src="js/quiz.js"></script>
</body>
</html>
